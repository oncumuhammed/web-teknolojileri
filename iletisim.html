<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Web Teknolojileri</title>
    <link
        href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="[https://unpkg.com/vue@3/dist/vue.global.js](https://unpkg.com/vue@3/dist/vue.global.js)"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top mb-5">
        <div class="container">
            <a class="navbar-brand" href="index.html">Muhammed</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehir.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgi-alanlarim.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                    <!-- GİRİŞ YAP LİNKİ GÜNCELLENDİ -->
                    <li class="nav-item ms-lg-3"><a class="btn btn-outline-light btn-modern btn-sm"
                            href="login.html">Giriş Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container fade-in" id="app">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="modern-card p-5 mb-5">
                    <h2 class="fw-bold text-primary border-bottom pb-3 mb-4">İletişime Geçin</h2>
                    <p class="text-muted mb-4">Görüş, öneri veya projeler için aşağıdaki formu kullanarak bana
                        ulaşabilirsiniz.</p>

                    <div id="error-box" class="alert alert-danger d-none" role="alert"></div>
                    <div v-if="vueErrors.length > 0" class="alert alert-danger" role="alert">
                        <ul class="mb-0">
                            <li v-for="err in vueErrors" :key="err">{{ err }}</li>
                        </ul>
                    </div>

                    <form action="islem.php" method="POST" id="iletisimFormu">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="ad" class="form-label fw-bold">Ad Soyad</label>
                                <input type="text" class="form-control" id="ad" name="ad" v-model="form.ad"
                                    placeholder="Adınız Soyadınız">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label fw-bold">E-posta</label>
                                <input type="email" class="form-control" id="email" name="email" v-model="form.email"
                                    placeholder="ornek@mail.com">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="telefon" class="form-label fw-bold">Telefon Numarası</label>
                                <input type="text" class="form-control" id="telefon" name="telefon"
                                    v-model="form.telefon" placeholder="05550001122">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="konu" class="form-label fw-bold">Konu</label>
                                <select class="form-select" id="konu" name="konu" v-model="form.konu">
                                    <option value="" disabled selected>Bir konu seçiniz...</option>
                                    <option value="Proje Teklifi">Proje Teklifi</option>
                                    <option value="Teknik Danışmanlık">Teknik Danışmanlık</option>
                                    <option value="Diğer">Diğer</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold d-block">Cinsiyetiniz</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek"
                                    v-model="form.cinsiyet">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın"
                                    v-model="form.cinsiyet">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="belirtmekIstemiyor"
                                    value="Belirtmek İstemiyorum" v-model="form.cinsiyet">
                                <label class="form-check-label" for="belirtmekIstemiyor">Belirtmek İstemiyorum</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="mesaj" class="form-label fw-bold">Mesajınız</label>
                            <textarea class="form-control" id="mesaj" name="mesaj" rows="4" v-model="form.mesaj"
                                placeholder="Mesajınızı buraya yazınız..."></textarea>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="onay" name="onay" v-model="form.onay">
                            <label class="form-check-label small text-muted" for="onay">Verilerimin işlenmesini ve
                                iletişim şartlarını onaylıyorum.</label>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="button" class="btn btn-primary btn-modern w-50"
                                onclick="validateNative()">Native JS ile Gönder</button>
                            <button type="button" class="btn btn-success btn-modern w-50" @click="validateVue">Vue.js
                                ile Gönder</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        function validateNative() {
            let errors = [];
            let ad = document.getElementById('ad').value.trim();
            let email = document.getElementById('email').value.trim();
            let telefon = document.getElementById('telefon').value.trim();
            let konu = document.getElementById('konu').value;
            let mesaj = document.getElementById('mesaj').value.trim();
            let onay = document.getElementById('onay').checked;
            let cinsiyetElement = document.querySelector('input[name="cinsiyet"]:checked');
            let cinsiyet = cinsiyetElement ? cinsiyetElement.value : null;

            if (ad === "") errors.push("Native JS: Ad Soyad alanı boş bırakılamaz.");
            let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) errors.push("Native JS: Geçerli bir e-posta adresi giriniz.");
            let telefonRegex = /^[0-9]+$/;
            if (!telefonRegex.test(telefon)) errors.push("Native JS: Telefon numarası sadece rakamlardan oluşmalıdır.");
            if (konu === "") errors.push("Native JS: Lütfen bir konu seçiniz.");
            if (!cinsiyet) errors.push("Native JS: Lütfen cinsiyet seçiminizi yapınız.");
            if (mesaj === "") errors.push("Native JS: Mesaj alanı boş bırakılamaz.");
            if (!onay) errors.push("Native JS: Kullanım şartlarını onaylamalısınız.");

            let errorBox = document.getElementById('error-box');
            if (errors.length > 0) {
                errorBox.innerHTML = "<strong>Lütfen Hataları Düzeltin:</strong><br>" + errors.join('<br>');
                errorBox.classList.remove('d-none');
            } else {
                errorBox.classList.add('d-none');
                alert("Native JS: Doğrulama Başarılı! Verileriniz sunucuya iletiliyor...");
                document.getElementById('iletisimFormu').submit();
            }
        }
    </script>
    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    form: { ad: '', email: '', telefon: '', konu: '', cinsiyet: null, mesaj: '', onay: false },
                    vueErrors: []
                }
            },
            methods: {
                validateVue() {
                    this.vueErrors = [];
                    document.getElementById('error-box').classList.add('d-none');
                    if (!this.form.ad.trim()) this.vueErrors.push("Vue.js: Ad Soyad alanı boş bırakılamaz.");
                    let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(this.form.email.trim())) this.vueErrors.push("Vue.js: Geçerli bir e-posta adresi giriniz.");
                    let telefonRegex = /^[0-9]+$/;
                    if (!telefonRegex.test(this.form.telefon.trim())) this.vueErrors.push("Vue.js: Telefon numarası sadece rakamlardan oluşmalıdır.");
                    if (!this.form.konu) this.vueErrors.push("Vue.js: Lütfen bir konu seçiniz.");
                    if (!this.form.cinsiyet) this.vueErrors.push("Vue.js: Lütfen cinsiyet seçiminizi yapınız.");
                    if (!this.form.mesaj.trim()) this.vueErrors.push("Vue.js: Mesaj alanı boş bırakılamaz.");
                    if (!this.form.onay) this.vueErrors.push("Vue.js: Kullanım şartlarını onaylamalısınız.");

                    if (this.vueErrors.length === 0) {
                        alert("Vue.js: Doğrulama Başarılı! Verileriniz sunucuya iletiliyor...");
                        document.getElementById('iletisimFormu').submit();
                    }
                }
            }
        }).mount('#app')
    </script>
    <script
        src="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js)"></script>
</body>

</html>
