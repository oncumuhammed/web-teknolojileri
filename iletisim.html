<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Muhammed Emin ÖNCÜ</title>
    <!-- Bootstrap CSS (Ödev Şartı) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Özel Tasarımımız -->
    <link rel="stylesheet" href="style.css">
    <!-- Vue.js 3 CDN (İkinci Form Doğrulama - Ödev Şartı) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>

<nav class="custom-navbar" id="mainNav">
    <div class="container">
        <div class="navbar-inner">
            <a class="navbar-brand" href="index.html">ÖNCÜ</a>
            <button class="navbar-toggler" id="toggler" aria-label="Menüyü aç/kapat">
                <span></span><span></span><span></span>
            </button>
            <ul class="navbar-nav" id="navMenu">
                <li><a class="nav-link" href="index.html">Hakkında</a></li>
                <li><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                <li><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                <li><a class="nav-link" href="miras.html">Mirasımız</a></li>
                <li><a class="nav-link" href="takim.html">Takımımız</a></li>
                <li><a class="nav-link" href="ilgi-alanlarim.html">İlgi Alanlarım</a></li>
                <li><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                <li><a class="btn-nav-login" href="login.html">Giriş Yap</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container fade-in" style="padding-top: 48px; padding-bottom: 48px;">

    <header class="text-center" style="margin-bottom: 40px;">
        <span class="badge-accent" style="margin-bottom: 12px; display: inline-block;">✉️ Bana Ulaşın</span>
        <h1 style="font-size: 2.5rem;"><span class="gradient-text">İletişime Geçin</span></h1>
        <p>Görüş, öneri veya projeler için formu kullanabilirsiniz.</p>
        <hr class="gradient-divider">
    </header>

    <div style="max-width: 720px; margin: 0 auto;">
        <div class="modern-card p-5" id="vueApp">

            <!-- Hata Kutuları -->
            <div class="alert alert-danger" id="nativeErrorBox"></div>
            <div class="alert alert-danger" id="jsErrorBox" v-html="jsErrors" :class="{ show: jsErrors }"></div>

            <form action="islem.php" method="POST" id="iletisimFormu" ref="form" novalidate>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label for="ad" class="form-label">Ad Soyad</label>
                        <input type="text" class="form-control" id="ad" name="ad" placeholder="Adınız Soyadınız" v-model="form.ad">
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">E-posta</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="ornek@mail.com" v-model="form.email">
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label for="telefon" class="form-label">Telefon Numarası</label>
                        <input type="text" class="form-control" id="telefon" name="telefon" placeholder="05550001122" v-model="form.telefon">
                    </div>
                    <div class="form-group">
                        <label for="konu" class="form-label">Konu</label>
                        <select class="form-control" id="konu" name="konu" v-model="form.konu">
                            <option value="" disabled selected>Bir konu seçiniz...</option>
                            <option value="Proje Teklifi">Proje Teklifi</option>
                            <option value="Teknik Danışmanlık">Teknik Danışmanlık</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <span class="form-label">Cinsiyetiniz</span>
                    <div class="form-radio-group">
                        <label class="radio-label">
                            <input type="radio" name="cinsiyet" value="Erkek" v-model="form.cinsiyet"> Erkek
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="cinsiyet" value="Kadın" v-model="form.cinsiyet"> Kadın
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="cinsiyet" value="Belirtmek İstemiyorum" v-model="form.cinsiyet"> Belirtmek İstemiyorum
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="mesaj" class="form-label">Mesajınız</label>
                    <textarea class="form-control" id="mesaj" name="mesaj" rows="4" placeholder="Mesajınızı buraya yazınız..." v-model="form.mesaj"></textarea>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="onay" name="onay" v-model="form.onay">
                        Verilerimin işlenmesini ve iletişim şartlarını onaylıyorum.
                    </label>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-primary btn-full" onclick="validateNative()" id="btn-native-js">
                        ⚙️ Native JS ile Gönder
                    </button>
                    <button type="button" class="btn btn-success btn-full" @click="validateVue" id="btn-vue-js">
                        💚 Vue.js ile Gönder
                    </button>
                </div>

            </form>
        </div>
    </div>

</main>

<footer class="site-footer">
    <div class="container">Muhammed Emin ÖNCÜ &copy; 2025 · Web Teknolojileri Projesi</div>
</footer>

<script>
    // Navbar
    window.addEventListener('scroll', function () {
        document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 20);
    });
    document.getElementById('toggler').addEventListener('click', function () {
        this.classList.toggle('open');
        document.getElementById('navMenu').classList.toggle('open');
    });

    // ── Vanilla JavaScript Form Doğrulama ──
    function validateNative() {
        var errors     = [];
        var ad         = document.getElementById('ad').value.trim();
        var email      = document.getElementById('email').value.trim();
        var telefon    = document.getElementById('telefon').value.trim();
        var konu       = document.getElementById('konu').value;
        var mesaj      = document.getElementById('mesaj').value.trim();
        var onay       = document.getElementById('onay').checked;
        var cinSec     = document.querySelector('input[name="cinsiyet"]:checked');
        var cinsiyet   = cinSec ? cinSec.value : null;

        var emailRegex   = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        var telefonRegex = /^[0-9]{10,11}$/;

        if (!ad)                        errors.push('Ad Soyad alanı boş bırakılamaz.');
        if (!emailRegex.test(email))    errors.push('Geçerli bir e-posta adresi giriniz.');
        if (!telefonRegex.test(telefon))errors.push('Telefon numarası 10-11 rakamdan oluşmalıdır.');
        if (!konu)                      errors.push('Lütfen bir konu seçiniz.');
        if (!cinsiyet)                  errors.push('Lütfen cinsiyet seçiminizi yapınız.');
        if (!mesaj)                     errors.push('Mesaj alanı boş bırakılamaz.');
        if (!onay)                      errors.push('Kullanım şartlarını onaylamalısınız.');

        var box = document.getElementById('nativeErrorBox');

        if (errors.length > 0) {
            box.innerHTML = '<strong>⚠️ Lütfen Hataları Düzeltin:</strong><br>' +
                errors.map(function (e) { return '• ' + e; }).join('<br>');
            box.classList.add('show');
            box.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
            box.classList.remove('show');
            alert('Doğrulama başarılı! Form sunucuya gönderiliyor...');
            document.getElementById('iletisimFormu').submit();
        }
    }

    // ── Vue.js 3 Form Doğrulama ──
    Vue.createApp({
        data() {
            return {
                jsErrors: '',
                form: {
                    ad: '',
                    email: '',
                    telefon: '',
                    konu: '',
                    cinsiyet: '',
                    mesaj: '',
                    onay: false
                }
            };
        },
        methods: {
            validateVue() {
                var errors = [];
                var emailRegex   = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                var telefonRegex = /^[0-9]{10,11}$/;

                if (!this.form.ad.trim())                        errors.push('Ad Soyad alanı boş bırakılamaz.');
                if (!emailRegex.test(this.form.email.trim()))    errors.push('Geçerli bir e-posta adresi giriniz.');
                if (!telefonRegex.test(this.form.telefon.trim()))errors.push('Telefon numarası 10-11 rakamdan oluşmalıdır.');
                if (!this.form.konu)                             errors.push('Lütfen bir konu seçiniz.');
                if (!this.form.cinsiyet)                         errors.push('Lütfen cinsiyet seçiminizi yapınız.');
                if (!this.form.mesaj.trim())                     errors.push('Mesaj alanı boş bırakılamaz.');
                if (!this.form.onay)                             errors.push('Kullanım şartlarını onaylamalısınız.');

                if (errors.length > 0) {
                    this.jsErrors = '<strong>⚠️ Vue.js Doğrulama Hatası:</strong><br>' +
                        errors.map(function(e){ return '• ' + e; }).join('<br>');
                    document.getElementById('jsErrorBox').scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    this.jsErrors = '';
                    alert('Vue.js doğrulama başarılı! Form sunucuya gönderiliyor...');
                    this.$refs.form.submit();
                }
            }
        }
    }).mount('#vueApp');
</script>
</body>
</html>
