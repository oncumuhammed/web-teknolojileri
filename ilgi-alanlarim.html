<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlgi Alanlarım - Web Teknolojileri</title>
    <link
        href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top mb-5">
        <div class="container">
            <a class="navbar-brand" href="index.html">Muhammed</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehir.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link active" href="ilgi-alanlarim.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                    <!-- GİRİŞ YAP LİNKİ GÜNCELLENDİ -->
                    <li class="nav-item ms-lg-3"><a class="btn btn-outline-light btn-modern btn-sm"
                            href="login.html">Giriş Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container fade-in">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-dark">İlgi Alanlarım</h1>
            <p class="lead text-secondary">Teknoloji, Yazılım ve Siber Dünyayı Konu Alan Yapımlar</p>
            <span class="badge bg-dark px-3 py-2 rounded-pill mt-2">📡 TVMaze API Entegrasyonu</span>
        </div>

        <div class="row" id="api-results">
            <div class="col-12 text-center py-5" id="loading-spinner">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-secondary fw-bold">Veriler API'den güvenli bir şekilde çekiliyor...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const resultsContainer = document.getElementById('api-results');
            fetch('[https://api.tvmaze.com/search/shows?q=cyber](https://api.tvmaze.com/search/shows?q=cyber)')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading-spinner').style.display = 'none';
                    data.forEach(item => {
                        const show = item.show;
                        const imageUrl = show.image ? show.image.medium : '[https://via.placeholder.com/210x295?text=Resim+Yok](https://via.placeholder.com/210x295?text=Resim+Yok)';
                        const cardHTML = `
                            <div class="col-md-4 col-lg-3 mb-4">
                                <div class="modern-card h-100 d-flex flex-column">
                                    <img src="${imageUrl}" class="card-img-top border-bottom" alt="${show.name}" style="height: 350px; object-fit: cover;">
                                    <div class="card-body d-flex flex-column p-4">
                                        <h5 class="card-title fw-bold text-dark mb-1">${show.name}</h5>
                                        <p class="card-text small text-secondary mb-4">
                                            <span class="badge bg-light text-dark border mt-2">${show.genres.join(', ') || 'Tür Belirtilmemiş'}</span>
                                        </p>
                                        <a href="${show.url}" target="_blank" class="btn btn-primary btn-modern mt-auto w-100">Detayları Gör</a>
                                    </div>
                                </div>
                            </div>
                        `;
                        resultsContainer.innerHTML += cardHTML;
                    });
                })
                .catch(error => {
                    document.getElementById('loading-spinner').innerHTML = `
                        <div class="alert alert-danger modern-card p-4" role="alert">
                            <h4 class="alert-heading fw-bold">Bağlantı Hatası!</h4>
                            <p>API sunucularına ulaşılamadı. İnternet bağlantınızı kontrol edip tekrar deneyin.</p>
                        </div>
                    `;
                    console.error("API Hatası:", error);
                });
        });
    </script>
    <script
        src="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js)"></script>
</body>

</html>
