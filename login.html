<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş | Muhammed Emin ÖNCÜ</title>
    <!-- Bootstrap CSS (Ödev Şartı) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Özel Tasarımımız -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-box fade-in">

        <div class="text-center" style="margin-bottom: 20px;">
            <a class="navbar-brand" href="index.html" style="font-size: 1.4rem;">ÖNCÜ</a>
        </div>

        <div class="modern-card p-5">

            <div class="text-center" style="margin-bottom: 28px;">
                <div style="width:56px;height:56px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 14px;">🔐</div>
                <h1 style="font-size: 1.4rem;">Sisteme Giriş</h1>
                <p style="font-size: 0.87rem; color: var(--text-3); margin-top: 4px;">Öğrenci bilgilerinizle devam edin</p>
            </div>

            <div class="alert alert-danger" id="errorAlert"></div>

            <form action="giris.php" method="POST" id="loginFormu" onsubmit="return validateLogin()">
                <div class="form-group">
                    <label for="email" class="form-label">Öğrenci E-posta</label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="b251210377@sakarya.edu.tr">
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label for="password" class="form-label">Şifre (Öğrenci No)</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="••••••••••">
                </div>
                <button class="btn btn-primary btn-full" type="submit" style="margin-bottom: 14px;">
                    Giriş Yap →
                </button>
                <div class="text-center">
                    <a href="index.html" style="font-size: 0.85rem; color: var(--text-3); transition: color 0.2s;"
                       onmouseover="this.style.color='#a5b4fc'"
                       onmouseout="this.style.color='var(--text-3)'">← Ana Sayfaya Dön</a>
                </div>
            </form>
        </div>

        <p class="text-center" style="margin-top: 20px; font-size: 0.8rem; color: var(--text-3);">
            Web Teknolojileri Projesi &copy; 2025
        </p>
    </div>

    <script>
        // ── JavaScript Form Doğrulama (Şartname Zorunluluğu) ──
        function validateLogin() {
            var errors     = [];
            var email      = document.getElementById('email').value.trim();
            var password   = document.getElementById('password').value.trim();
            var emailRegex = /^[a-zA-Z0-9._%+-]+@sakarya\.edu\.tr$/;

            if (!email)                      errors.push('E-posta alanı boş bırakılamaz.');
            else if (!emailRegex.test(email)) errors.push('Geçerli bir @sakarya.edu.tr e-posta adresi giriniz.');
            if (!password)                   errors.push('Şifre alanı boş bırakılamaz.');

            var box = document.getElementById('errorAlert');
            if (errors.length > 0) {
                box.innerHTML = '⚠️ ' + errors.join('<br>⚠️ ');
                box.classList.add('show');
                return false; // Form gönderimini engelle
            }
            box.classList.remove('show');
            return true; // PHP'ye gönder
        }

        // PHP'den dönen hata parametresini oku
        var params = new URLSearchParams(window.location.search);
        var box    = document.getElementById('errorAlert');

        if (params.get('error') === 'empty') {
            box.textContent = '⚠️ Kullanıcı adı ve şifre boş bırakılamaz!';
            box.classList.add('show');
        } else if (params.get('error') === 'wrong') {
            box.textContent = '❌ Hatalı e-posta veya şifre girdiniz!';
            box.classList.add('show');
        }
    </script>
</body>
</html>
